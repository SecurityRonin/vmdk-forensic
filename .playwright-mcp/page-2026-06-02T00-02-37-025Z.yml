              - img [ref=e151]
          - paragraph [ref=e153]: "The libvmdk package comes with automated tests, which are stored in the sub directory: tests."
          - paragraph [ref=e154]: "To run the automated tests:"
          - generic [ref=e155]:
            - code [ref=e157]: make check
            - button "Copy code to clipboard" [ref=e159] [cursor=pointer]:
              - img [ref=e160]
          - paragraph [ref=e163]: The automated tests are currently only intended to run on a system that can run a bash shell.
          - generic [ref=e164]:
            - heading "Test files" [level=2] [ref=e165]
            - 'link "Permalink: Test files" [ref=e166] [cursor=pointer]':
              - /url: "#test-files"
              - img [ref=e167]
          - paragraph [ref=e169]:
            - strong [ref=e170]: Note that no test files are provided by the project.
          - paragraph [ref=e171]: "If you have your own test files the automated tests expect the files to be stored in sub directories of:"
          - generic [ref=e172]:
            - code [ref=e174]: tests/input/
            - button "Copy code to clipboard" [ref=e176] [cursor=pointer]:
              - img [ref=e177]
          - paragraph [ref=e180]: "Every sub directory is considered a test set, e.g. the basic test set would be the directory:"
          - generic [ref=e181]:
            - code [ref=e183]: tests/input/basic
            - button "Copy code to clipboard" [ref=e185] [cursor=pointer]:
              - img [ref=e186]
          - generic [ref=e189]:
            - heading "Test profiles" [level=2] [ref=e190]
            - 'link "Permalink: Test profiles" [ref=e191] [cursor=pointer]':
              - /url: "#test-profiles"
              - img [ref=e192]
          - paragraph [ref=e194]: "There are also multiple test profiles:"
          - list [ref=e195]:
            - listitem [ref=e196]: libvmdk
            - listitem [ref=e197]: pyvmdk
            - listitem [ref=e198]: vmdkinfo
          - paragraph [ref=e199]: "These test profiles are used by one or more tests. By default the tests run all the test sets, if applicable. Each test profile can define which test sets to ignore in the ignore-file, e.g. for the libvmdk test profile:"
          - generic [ref=e200]:
            - code [ref=e202]: tests/input/.libvmdk/ignore
            - button "Copy code to clipboard" [ref=e204] [cursor=pointer]:
              - img [ref=e205]
          - paragraph [ref=e208]: "Every line of the ignore-file specifies (the sub directory name of) the test set that should be ignored, e.g. for the basic test set:"
          - generic [ref=e209]:
            - code [ref=e211]: basic
            - button "Copy code to clipboard" [ref=e213] [cursor=pointer]:
              - img [ref=e214]
          - paragraph [ref=e217]: Some of the tests store data in the test profile to be used for comparison in successive test runs. At the moment this data needs to be cleaned out manual if it causes the test to fail due to legitimate changes.
          - paragraph [ref=e218]: "Each test profile can also define which files to run in a specific test set in the files-file, e.g. for the basic test set in the libvmdk test profile:"
          - generic [ref=e219]:
            - code [ref=e221]: tests/input/.libvmdk/basic/files
            - button "Copy code to clipboard" [ref=e223] [cursor=pointer]:
              - img [ref=e224]
          - paragraph [ref=e227]: Every line of the files-file specifies the filename in the test set to include in the test. Files not defined in the files-file are ignored by the test.
          - paragraph [ref=e228]: "E.g. if the basic test set sub directory contains the files:"
          - generic [ref=e229]:
            - code [ref=e231]: image1.vmdk image2.vmdk
            - button "Copy code to clipboard" [ref=e233] [cursor=pointer]:
              - img [ref=e234]
          - paragraph [ref=e237]: "and only the first file needs to be tested, the files-file can then be defined as:"
