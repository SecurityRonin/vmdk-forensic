name: Fuzz (scheduled)

# Deep, time-boxed fuzzing of every target on a schedule (and on demand). PR CI runs
# a 45s smoke pass per target; this runs each for 10 minutes and uploads any crash.
on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_open, fuzz_read, fuzz_recover]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - run: cargo install cargo-fuzz
      - name: Seed corpus from committed images
        run: |
          mkdir -p "fuzz/corpus/${{ matrix.target }}"
          cp vmdk/tests/data/*.vmdk "fuzz/corpus/${{ matrix.target }}/" 2>/dev/null || true
      - name: Fuzz ${{ matrix.target }} (10 min)
        run: cargo fuzz run "${{ matrix.target }}" -- -max_total_time=600 -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
